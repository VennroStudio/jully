version: '3.8'

services:
  wordpress:
    image: wordpress:php8.4-apache
    container_name: wordpress-container
    restart: always
    environment:
      WORDPRESS_DB_HOST: mariadb-container:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: root
      WORDPRESS_DB_NAME: wp
    volumes:
      - ./jullybride.ru:/var/www/html
    networks:
      - proxy

networks:
  proxy:
    external: true